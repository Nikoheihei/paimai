
services:
  mysql:
    image: mysql:8.0
    container_name: paimai-mysql
    restart: always
    environment:
      MYSQL_DATABASE: paimai
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-master:
    image: redis:7-alpine
    container_name: paimai-redis-master
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_master_data:/data
    command: redis-server --appendonly yes --appendfsync everysec

  redis-slave:
    image: redis:7-alpine
    container_name: paimai-redis-slave
    restart: always
    ports:
      - "6382:6379"
    volumes:
      - redis_slave_data:/data
    command: redis-server --replicaof paimai-redis-master 6379 --appendonly yes --appendfsync everysec
    depends_on:
      - redis-master

  server:
    build: ./server
    container_name: paimai-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      MYSQL_DSN: "root:rootpassword@tcp(mysql:3306)/paimai?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_MASTER_ADDR: "redis-master:6379"
      REDIS_SLAVE_ADDR: "redis-slave:6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis-master:
        condition: service_started
      redis-slave:
        condition: service_started

  web-h5:
    build: ./web-h5
    container_name: paimai-web-h5
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - server

  web-admin:
    build: ./web-admin
    container_name: paimai-web-admin
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - server

volumes:
  mysql_data:
  redis_master_data:
  redis_slave_data:
